version: '3.8'

services:
  zep:
    image: zepai/zep:latest
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./zep.yaml:/app/zep.yaml
    environment:
      - ZEP_NLP_OPENAI_API_KEY=${ZEP_NLP_OPENAI_API_KEY}
      - ZEP_NLP_OPENAI_BASE_URL=${ZEP_NLP_OPENAI_BASE_URL}
      - ZEP_NLP_OPENAI_MODEL=${ZEP_NLP_OPENAI_MODEL}
    depends_on:
      db:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_dbms_jvm_additional=-Dorg.apache.lucene.maxClauseCount=4096
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  graphiti:
    image: zepai/graphiti:latest
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - MODEL_NAME=${MODEL_NAME}
      
      # 专门为 Embedding 指定不同的 URL (如 ModelScope)
      - EMBEDDING_OPENAI_BASE_URL=${EMBEDDING_OPENAI_BASE_URL}
      - EMBEDDING_OPENAI_API_KEY=${EMBEDDING_OPENAI_API_KEY}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - GRAPHITI_LLM_MAX_CONCURRENCY=${GRAPHITI_LLM_MAX_CONCURRENCY}
      - GRAPHITI_LLM_MIN_INTERVAL=${GRAPHITI_LLM_MIN_INTERVAL}
      
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - ./zep_graphiti.py:/app/graph_service/zep_graphiti.py
      - ./ingest.py:/app/graph_service/routers/ingest.py
      - ./graph_main.py:/app/graph_service/main.py
    ports:
      - "8003:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      zep:
        condition: service_started

  db:
    image: ankane/pgvector:latest # 使用 pgvector 镜像，因为 Zep 存储需要向量支持
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  neo4j_data:
  neo4j_logs:

networks:
  default:
    name: novel_network
